name: JM Valley — Weekly JM Store Report

# Runs every Monday at 7:30 AM CT year-round.
# Two cron lines handle daylight saving automatically:
#   12:30 UTC = 7:30 AM CDT (Mar–Nov, UTC-5)
#   13:30 UTC = 7:30 AM CST (Nov–Mar, UTC-6)
# During the two DST transition Mondays per year both fire — harmless,
# the second run skips files already processed.
on:
  schedule:
    - cron: '30 12 * * 1'
    - cron: '30 13 * * 1'
  workflow_dispatch:

jobs:
  fetch-weekly-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install psycopg2-binary requests pdfplumber

      - name: Fetch weekly JM store report
        env:
          SUPABASE_HOST:     ${{ secrets.SUPABASE_HOST }}
          SUPABASE_PORT:     ${{ secrets.SUPABASE_PORT }}
          SUPABASE_DBNAME:   ${{ secrets.SUPABASE_DBNAME }}
          SUPABASE_USER:     ${{ secrets.SUPABASE_USER }}
          SUPABASE_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
        run: python scripts/fetch_weekly_email.py

      - name: Report result
        if: always()
        run: echo "Weekly JM fetch finished with status ${{ job.status }} at $(date -u)"

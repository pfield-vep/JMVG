name: JM Valley — Daily Google Reviews Fetch

# Runs at 7:00 AM CT (12:00 UTC) every day — after the business day opens
# Also triggerable manually from the GitHub Actions tab
on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  fetch-reviews:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install psycopg2-binary

      - name: Fetch latest Google Reviews for all stores
        env:
          SUPABASE_HOST:          ${{ secrets.SUPABASE_HOST }}
          SUPABASE_PORT:          ${{ secrets.SUPABASE_PORT }}
          SUPABASE_DBNAME:        ${{ secrets.SUPABASE_DBNAME }}
          SUPABASE_USER:          ${{ secrets.SUPABASE_USER }}
          SUPABASE_PASSWORD:      ${{ secrets.SUPABASE_PASSWORD }}
          GOOGLE_PLACES_API_KEY:  ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: python scripts/fetch_google_reviews.py --fetch

      - name: Report result
        if: always()
        run: echo "Reviews fetch finished with status ${{ job.status }} at $(date -u)"

name: Weekly Jersey Mike's Update

on:
  schedule:
    - cron: '0 13 * * 1'
  workflow_dispatch:

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install requests psycopg2-binary pdfplumber
      - name: Run email fetch and load
        env:
          AZURE_CLIENT_ID:     ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID:     ${{ secrets.AZURE_TENANT_ID }}
          AZURE_REFRESH_TOKEN: ${{ secrets.AZURE_REFRESH_TOKEN }}
          AZURE_USER_EMAIL:    ${{ secrets.AZURE_USER_EMAIL }}
          SUPABASE_HOST:       ${{ secrets.SUPABASE_HOST }}
          SUPABASE_USER:       ${{ secrets.SUPABASE_USER }}
          SUPABASE_PASSWORD:   ${{ secrets.SUPABASE_PASSWORD }}
          SUPABASE_DBNAME:     ${{ secrets.SUPABASE_DBNAME }}
        run: python email_fetch.py

name: JM Valley — Weekly BlakeWard Benchmark

# Runs every Monday at 9:00 AM CT year-round.
# Two cron lines handle daylight saving automatically:
#   14:00 UTC = 9:00 AM CDT (Mar–Nov, UTC-5)
#   15:00 UTC = 9:00 AM CST (Nov–Mar, UTC-6)
# During the two DST transition Mondays both fire — harmless,
# the second run skips PDFs already processed.
on:
  schedule:
    - cron: '0 14 * * 1'
    - cron: '0 15 * * 1'
  workflow_dispatch:

jobs:
  fetch-benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install psycopg2-binary requests pdfplumber

      - name: Fetch BlakeWard benchmark PDFs
        env:
          SUPABASE_HOST:     ${{ secrets.SUPABASE_HOST }}
          SUPABASE_PORT:     ${{ secrets.SUPABASE_PORT }}
          SUPABASE_DBNAME:   ${{ secrets.SUPABASE_DBNAME }}
          SUPABASE_USER:     ${{ secrets.SUPABASE_USER }}
          SUPABASE_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
        run: python scripts/fetch_benchmark_email.py

      - name: Report result
        if: always()
        run: echo "BlakeWard fetch finished with status ${{ job.status }} at $(date -u)"

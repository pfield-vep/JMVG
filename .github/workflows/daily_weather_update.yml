name: JM Valley — Daily Weather Update

# Runs at 6:00 AM CT (11:00 UTC) every day — before the business day
# Also triggerable manually from the GitHub Actions tab
on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  update-weather:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install psycopg2-binary

      - name: Update weather data (market-level + per-store with hourly dayparts)
        env:
          SUPABASE_HOST:     ${{ secrets.SUPABASE_HOST }}
          SUPABASE_PORT:     ${{ secrets.SUPABASE_PORT }}
          SUPABASE_DBNAME:   ${{ secrets.SUPABASE_DBNAME }}
          SUPABASE_USER:     ${{ secrets.SUPABASE_USER }}
          SUPABASE_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
        run: python scripts/fetch_weather.py --update

      - name: Report result
        if: always()
        run: echo "Weather update finished with status ${{ job.status }} at $(date -u)"
